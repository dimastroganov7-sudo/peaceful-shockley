<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Три сестры · Благотворительный фонд</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Иконки SF Symbols (имитация через Font Awesome) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div id="app">
      <!-- Экран авторизации -->
      <div id="authScreen" class="screen active">
        <div class="auth-container">
          <div class="logo">
            <i
              class="fas fa-church"
              style="font-size: 48px; color: #007aff"
            ></i>
            <h1>Благотворительный фонд</h1>
            <h2>«Три сестры»</h2>
          </div>

          <!-- Форма входа -->
          <div id="loginForm">
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="loginEmail"
                placeholder="Email"
                autocomplete="email"
              />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="loginPassword" placeholder="Пароль" />
            </div>
            <button class="btn primary" onclick="login()">Войти</button>
            <p class="link" onclick="showRegister()">
              Зарегистрировать аккаунт
            </p>
          </div>

          <!-- Форма регистрации (скрыта) -->
          <div id="registerForm" style="display: none">
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" id="regFirstName" placeholder="Имя" />
            </div>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" id="regLastName" placeholder="Фамилия" />
            </div>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" id="regEmail" placeholder="Email" />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="regPassword" placeholder="Пароль" />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="regConfirm"
                placeholder="Подтвердите пароль"
              />
            </div>
            <div class="input-group phone-group">
              <select id="countryCode" class="country-select">
                <option value="+7">🇷🇺 +7</option>
                <option value="+380">🇺🇦 +380</option>
                <option value="+375">🇧🇾 +375</option>
                <option value="+1">🇺🇸 +1</option>
              </select>
              <input type="tel" id="regPhone" placeholder="Номер телефона" />
            </div>
            <button class="btn primary" onclick="register()">
              Зарегистрироваться
            </button>
            <p class="link" onclick="showLogin()">Уже есть аккаунт? Войти</p>
          </div>
        </div>
      </div>

      <!-- Основной интерфейс пользователя -->
      <div id="mainScreen" class="screen">
        <!-- Навигация -->
        <nav class="bottom-nav">
          <div class="nav-item active" data-tab="home">
            <i class="fas fa-home"></i><span>Главная</span>
          </div>
          <div class="nav-item" data-tab="cart">
            <i class="fas fa-shopping-bag"></i><span>Корзина</span>
          </div>
          <div class="nav-item" data-tab="profile">
            <i class="fas fa-user"></i><span>Профиль</span>
          </div>
          <div class="nav-item" data-tab="orders">
            <i class="fas fa-list"></i><span>Моя помощь</span>
          </div>
        </nav>

        <!-- Шапка с иконкой корзины -->
        <header>
          <h3>Три сестры</h3>
          <div class="header-icons">
            <div class="cart-icon" onclick="switchTab('cart')">
              <i class="fas fa-church"></i>
              <span id="cartBadge" class="badge">0</span>
            </div>
            <i
              class="fas fa-user-cog"
              onclick="openAdminLogin()"
              style="margin-left: 15px"
            ></i>
          </div>
        </header>

        <!-- Контент вкладок -->
        <div class="tab-content">
          <!-- Главная (товары) -->
          <div id="homeTab" class="tab-pane active">
            <div class="products-grid" id="productsContainer"></div>
          </div>

          <!-- Корзина -->
          <div id="cartTab" class="tab-pane">
            <div class="cart-header">
              <h4>Моя корзина</h4>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer">
              <div class="address-box">
                <i class="fas fa-map-pin"></i>
                <span id="pickupAddress">ул. Ленина, 10 (склад фонда)</span>
              </div>
              <div class="slot-selector">
                <label>Выберите время получения:</label>
                <select id="timeSlotSelect">
                  <option value="">Загрузка...</option>
                </select>
              </div>
              <button class="btn primary" onclick="createOrder()">
                Получить помощь
              </button>
            </div>
          </div>

          <!-- Профиль -->
          <div id="profileTab" class="tab-pane">
            <div class="profile-card">
              <i
                class="fas fa-user-circle"
                style="font-size: 64px; color: #007aff"
              ></i>
              <div class="profile-info">
                <p><strong id="profileName"></strong></p>
                <p id="profilePhone"></p>
              </div>
            </div>
            <button class="btn secondary" onclick="logout()">Выйти</button>
          </div>

          <!-- Мои заказы -->
          <div id="ordersTab" class="tab-pane">
            <div id="ordersList"></div>
          </div>
        </div>
      </div>

      <!-- Админ-панель (скрыта по умолчанию) -->
      <div id="adminScreen" class="screen">
        <header>
          <h3>Администратор</h3>
          <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </header>
        <div class="admin-tabs">
          <button class="tab-btn active" data-admin-tab="products">
            Товары
          </button>
          <button class="tab-btn" data-admin-tab="calendar">Календарь</button>
          <button class="tab-btn" data-admin-tab="history">История</button>
        </div>
        <div class="admin-content">
          <div id="adminProducts" class="admin-pane active">
            <button class="btn primary" onclick="openAddProductModal()">
              + Добавить товар
            </button>
            <div id="adminProductsList"></div>
          </div>
          <div id="adminCalendar" class="admin-pane">
            <!-- Упрощённый календарь -->
            <h4>Слоты раздачи</h4>
            <div id="slotsList"></div>
            <button class="btn primary" onclick="openAddSlotModal()">
              + Добавить слот
            </button>
          </div>
          <div id="adminHistory" class="admin-pane">
            <p>История выдачи</p>
          </div>
        </div>
      </div>

      <!-- Модальное окно админ-входа -->
      <div id="adminLoginModal" class="modal">
        <div class="modal-content">
          <h3>Вход для администратора</h3>
          <input
            type="text"
            id="adminLogin"
            placeholder="Логин"
            value="STROGANOVA"
          />
          <input
            type="password"
            id="adminPassword"
            placeholder="Пароль"
            value="12345"
          />
          <button class="btn primary" onclick="adminLogin()">Войти</button>
          <button class="btn secondary" onclick="closeModal('adminLoginModal')">
            Отмена
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
