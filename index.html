<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Три сестры · Благотворительный фонд</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; }
    body { background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #app { width: 100%; max-width: 400px; margin: 0 auto; background: white; min-height: 700px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }
    .auth-container { padding: 40px 20px; text-align: center; }
    .logo h1 { font-size: 24px; font-weight: 600; color: #1c1c1e; margin-top: 20px; }
    .logo h2 { font-size: 20px; font-weight: 400; color: #007aff; margin-bottom: 40px; }
    .input-group { display: flex; align-items: center; background: #f2f2f7; border-radius: 16px; padding: 4px 16px; margin-bottom: 16px; }
    .input-group i { color: #8e8e93; width: 24px; }
    .input-group input, .input-group select { flex: 1; border: none; background: transparent; padding: 14px 0; font-size: 16px; outline: none; }
    .btn { border: none; border-radius: 16px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 12px; transition: 0.2s; }
    .btn.primary { background: #007aff; color: white; }
    .btn.secondary { background: #f2f2f7; color: #007aff; }
    .btn.danger { background: #ff3b30; color: white; }
    .btn.small { padding: 8px 12px; font-size: 14px; width: auto; }
    .link { color: #007aff; text-decoration: none; font-size: 14px; cursor: pointer; margin-top: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: white; border-bottom: 1px solid #e5e5ea; }
    header h3 { font-size: 20px; font-weight: 600; }
    .header-icons { display: flex; align-items: center; }
    .profile-icon-header { cursor: pointer; width: 36px; height: 36px; border-radius: 18px; background: #f2f2f7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .profile-icon-header img { width: 100%; height: 100%; object-fit: cover; }
    .tab-content { flex: 1; overflow-y: auto; padding: 16px; background: #f5f5f7; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .product-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .product-photo { width: 100%; height: 120px; border-radius: 16px; margin-bottom: 8px; background: #f2f2f7; overflow: hidden; cursor: pointer; position: relative; }
    .product-photo img { width: 100%; height: 100%; object-fit: cover; }
    .product-stats { font-size: 12px; color: #8e8e93; margin: 4px 0; }
    .cart-item { display: flex; align-items: center; gap: 12px; background: white; border-radius: 16px; padding: 12px; margin-bottom: 12px; }
    .cart-item-photo { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #f2f2f7; }
    .cart-item-info { flex: 1; }
    .map-container { height: 180px; border-radius: 16px; margin: 12px 0; }
    .slot-select { background: #f2f2f7; border-radius: 16px; padding: 14px 16px; margin: 16px 0; }
    .slot-select select { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: 500; color: #1c1c1e; outline: none; }
    .bottom-nav { display: flex; justify-content: space-around; background: white; padding: 12px 0 20px; border-top: 1px solid #e5e5ea; border-radius: 20px 20px 0 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 12px; cursor: pointer; position: relative; }
    .nav-item i { font-size: 22px; margin-bottom: 4px; }
    .nav-item.active { color: #007aff; }
    .badge { position: absolute; top: -6px; right: 4px; background: #ff3b30; color: white; font-size: 12px; font-weight: bold; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { flex: 1; padding: 12px; border-radius: 16px; border: 1px solid #e5e5ea; background: white; font-size: 14px; }
    .admin-tabs { display: flex; border-bottom: 1px solid #e5e5ea; flex-wrap: wrap; }
    .tab-btn { flex: 1; padding: 14px 8px; background: none; border: none; font-size: 14px; font-weight: 500; color: #8e8e93; cursor: pointer; }
    .tab-btn.active { color: #007aff; border-bottom: 2px solid #007aff; }
    .admin-pane { display: none; padding: 20px; }
    .admin-pane.active { display: block; }
    .admin-products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .admin-product-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-content { background: white; padding: 24px; border-radius: 24px; width: 100%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
    .modal-content input, .modal-content select { width: 100%; padding: 16px; border: 1px solid #e5e5ea; border-radius: 16px; margin-bottom: 20px; font-size: 16px; background: #f9f9fb; }
    .order-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .petition-item { background: white; border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .selection-circle { width: 24px; height: 24px; border-radius: 12px; border: 2px solid #ccc; background: white; cursor: pointer; }
    .selection-circle.selected { background: #007aff; border-color: #007aff; }
    .mini-photo { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; margin-right: 4px; cursor: pointer; }
    .photo-filter-strip { display: flex; gap: 10px; overflow-x: auto; padding: 8px 0; margin-bottom: 16px; }
    .photo-filter-item { width: 56px; height: 56px; border-radius: 28px; border: 3px solid transparent; padding: 2px; cursor: pointer; }
    .photo-filter-item.active { border-color: #007aff; }
    .photo-filter-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 16px; }
    .calendar-day { padding: 8px; text-align: center; border-radius: 12px; background: #f2f2f7; cursor: pointer; }
    .calendar-day.has-slot { background: #007aff; color: white; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav button { width: 44px; height: 44px; border-radius: 22px; background: #007aff; color: white; border: none; cursor: pointer; font-size: 18px; }
    .fullscreen-photo-modal .modal-content { background: black; padding: 8px; }
    .fullscreen-photo-modal img { width: 100%; border-radius: 16px; }
    .checkbox-label { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 16px; }
    .limit-card { background: white; border-radius: 24px; padding: 28px; text-align: center; }
    .limit-card input { width: 100%; padding: 18px; font-size: 20px; text-align: center; border: 1px solid #e5e5ea; border-radius: 20px; margin: 20px 0; }
    .petition-stats { margin-top: 16px; padding: 12px; background: #f2f2f7; border-radius: 16px; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
<div id="app">
  <!-- АВТОРИЗАЦИЯ (без изменений) -->
  <div id="authScreen" class="screen active">
    <div class="auth-container">
      <div class="logo"><i class="fas fa-church" style="font-size:48px;color:#007aff;"></i><h1>Благотворительный фонд</h1><h2>«Три сестры»</h2></div>
      <div id="loginForm">
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" value="user@test.com"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль" value="123456"></div>
        <button class="btn primary" onclick="login()">Войти</button>
        <p class="link" onclick="showRegister()">Зарегистрироваться</p>
        <p class="link" style="font-size:12px;">Админ: admin@fond.ru / admin123</p>
      </div>
      <div id="registerForm" style="display:none;">
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regFirstName" placeholder="Имя"></div>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regLastName" placeholder="Фамилия"></div>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regConfirm" placeholder="Подтвердите пароль"></div>
        <div class="input-group phone-group"><select id="countryCode"><option value="+7">🇷🇺 +7</option></select><input type="tel" id="regPhone" placeholder="Номер"></div>
        <button class="btn primary" onclick="register()">Зарегистрироваться</button>
        <p class="link" onclick="showLogin()">Уже есть аккаунт? Войти</p>
      </div>
    </div>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН ПОЛЬЗОВАТЕЛЯ -->
  <div id="mainScreen" class="screen">
    <header>
      <h3>Три сестры</h3>
      <div class="header-icons">
        <div class="profile-icon-header" onclick="switchTab('profile')" id="headerProfileIcon">
          <i class="fas fa-user-circle" style="font-size:28px;color:#007aff;"></i>
        </div>
      </div>
    </header>
    <div class="tab-content" id="userTabContent">
      <div id="homeTab" class="tab-pane active">
        <div class="filter-bar">
          <select id="categoryFilter"><option value="">Все категории</option></select>
          <select id="sortFilter"><option value="name_asc">А-Я</option><option value="name_desc">Я-А</option><option value="new">Сначала новые</option><option value="old">Сначала старые</option></select>
        </div>
        <div class="products-grid" id="productsContainer"></div>
      </div>
      <div id="cartTab" class="tab-pane">
        <h4>Корзина помощи</h4>
        <div id="cartItems"></div>
        <div class="map-container" id="cartMap"></div>
        <div class="slot-select">
          <select id="timeSlotSelect"></select>
        </div>
        <button class="btn primary" style="margin-top: 12px;" onclick="createOrder()">Отправить на согласование</button>
      </div>
      <div id="profileTab" class="tab-pane">
        <div class="profile-card"><img id="profileAvatar" style="width:64px;height:64px;border-radius:32px;"><i id="defaultAvatar" class="fas fa-user-circle" style="font-size:64px;color:#007aff;"></i><div><p><strong id="profileName"></strong></p><p id="profilePhone"></p></div></div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;"><button class="btn secondary" onclick="document.getElementById('avatarInput').click()">Изменить фото</button><button class="btn secondary" onclick="saveAvatar()">Сохранить</button>
        <button class="btn secondary" onclick="logout()">Выйти</button>
      </div>
      <div id="ordersTab" class="tab-pane">
        <div class="filter-bar">
          <select id="orderStatusFilter"><option value="">Все статусы</option><option value="pending">На согласовании</option><option value="approved">Согласован</option><option value="partially_approved">Частично согласован</option><option value="rejected">Отказан</option></select>
          <select id="orderSlotFilter"><option value="">Все даты</option></select>
        </div>
        <div id="ordersList"></div>
      </div>
    </div>
    <nav class="bottom-nav">
      <div class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Главная</span></div>
      <div class="nav-item" data-tab="cart"><i class="fas fa-shopping-basket"></i><span>Корзина</span><span id="navCartBadge" class="badge">0</span></div>
      <div class="nav-item" data-tab="orders"><i class="fas fa-list"></i><span>Мои заказы</span></div>
    </nav>
  </div>

  <!-- АДМИН-ПАНЕЛЬ -->
  <div id="adminScreen" class="screen">
    <header><h3>Администратор</h3><i class="fas fa-sign-out-alt" onclick="logout()"></i></header>
    <div class="admin-tabs">
      <button class="tab-btn active" data-admin-tab="products">Товары</button>
      <button class="tab-btn" data-admin-tab="petitions">Прошения</button>
      <button class="tab-btn" data-admin-tab="calendar">Календарь</button>
      <button class="tab-btn" data-admin-tab="history">Заказы</button>
      <button class="tab-btn" data-admin-tab="recipients">Лимиты</button>
    </div>
    <div class="admin-content" style="flex:1; overflow-y:auto;">
      <div id="adminProducts" class="admin-pane active"><button class="btn primary" onclick="openAddProductModal()">+ Добавить товар</button><div id="adminProductsList" class="admin-products-grid"></div></div>
      <div id="adminPetitions" class="admin-pane">
        <div class="filter-bar"><input id="petitionSearch" placeholder="Поиск"></div>
        <div class="photo-filter-strip" id="photoFilterStrip"></div>
        <div style="display:flex; gap:8px; margin-bottom:12px;"><button class="btn secondary small" id="toggleSelectModeBtn" onclick="togglePetitionSelectMode()">Изм</button></div>
        <div id="petitionBulkActions" style="display:none;"><button class="btn primary small" onclick="bulkApprovePetitions()">✓ Согласовать</button><button class="btn danger small" onclick="bulkRejectPetitions()">✗ Отказать</button><button class="btn secondary small" onclick="selectAllPetitions()">Выбрать все</button></div>
        <div id="petitionsList"></div>
        <div id="petitionStats" class="petition-stats"></div>
      </div>
      <div id="adminCalendar" class="admin-pane">
        <div class="calendar-header">
          <span id="calendarMonthYear"></span>
          <div class="calendar-nav"><button onclick="changeCalendarMonth(-1)"><i class="fas fa-chevron-left"></i></button><button onclick="changeCalendarMonth(1)"><i class="fas fa-chevron-right"></i></button></div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div style="margin-top: 24px;"><button class="btn primary" onclick="openAddSlotModal()">+ Добавить слот</button></div>
        <div id="slotsList" class="mt-2"></div>
        <div id="calendarDayDetails" style="margin-top: 20px;"></div>
      </div>
      <div id="adminHistory" class="admin-pane">
        <div class="filter-bar"><select id="adminOrderDateFilter"><option value="">Все даты</option></select></div>
        <div class="admin-actions"><button class="btn secondary small" onclick="exportOrdersToExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn secondary small" onclick="printStickersWord()"><i class="fas fa-print"></i> Стикеры</button></div>
        <div id="allOrdersList"></div>
      </div>
      <div id="adminRecipients" class="admin-pane">
        <div class="limit-card"><h4>Лимит товаров в заказе</h4><input type="number" id="maxItemsLimit" value="10" min="1"><button class="btn primary" onclick="saveMaxItemsLimit()">Сохранить</button><p>Текущий лимит: <span id="currentLimitDisplay">10</span></p></div>
      </div>
    </div>
  </div>

  <!-- МОДАЛКИ -->
  <div id="addProductModal" class="modal"><div class="modal-content"><i class="fas fa-times close-icon" onclick="closeModal('addProductModal')"></i><h3 style="margin-bottom:20px;">Новый товар</h3><input id="prodName" placeholder="Название"><input id="prodArticle" placeholder="Артикул"><select id="prodCategory"><option>Продукты</option><option>Одежда</option><option>Гигиена</option><option>Прочее</option></select><input type="number" id="prodQuantity" value="1" min="1"><div class="checkbox-label"><input type="checkbox" id="prodPlaceImmediately"> Разместить сразу</div><input type="file" id="productPhotosInput" multiple><div id="photoPreviewContainer" class="photo-preview"></div><button class="btn primary" onclick="addProduct()">Сохранить</button></div></div>
  <div id="addSlotModal" class="modal"><div class="modal-content"><i class="fas fa-times close-icon" onclick="closeModal('addSlotModal')"></i><h3 style="margin-bottom:20px;">Новый слот</h3><input type="datetime-local" id="slotDateTime"><input type="number" id="slotCapacity" placeholder="Макс. заказов" value="5" min="1"><button class="btn primary" style="margin-top:12px;" onclick="addSlot()">Добавить</button></div></div>
  <div id="fullscreenPhotoModal" class="modal fullscreen-photo-modal" onclick="closeModal('fullscreenPhotoModal')"><div class="modal-content"><img id="fullscreenImage"></div></div>
</div>

<script>
  (function(){
    // ---------- Хранилище ----------
    const STORAGE = {
      users: () => JSON.parse(localStorage.getItem('fund_users') || '[]'),
      saveUsers: (u) => localStorage.setItem('fund_users', JSON.stringify(u)),
      products: () => JSON.parse(localStorage.getItem('fund_products') || '[]'),
      saveProducts: (p) => localStorage.setItem('fund_products', JSON.stringify(p)),
      slots: () => JSON.parse(localStorage.getItem('fund_slots') || '[]'),
      saveSlots: (s) => localStorage.setItem('fund_slots', JSON.stringify(s)),
      orders: () => JSON.parse(localStorage.getItem('fund_orders') || '[]'),
      saveOrders: (o) => localStorage.setItem('fund_orders', JSON.stringify(o)),
      currentUser: () => JSON.parse(sessionStorage.getItem('currentUser') || 'null'),
      setCurrentUser: (u) => sessionStorage.setItem('currentUser', JSON.stringify(u)),
      cart: () => JSON.parse(localStorage.getItem('fund_cart') || '[]'),
      saveCart: (c) => localStorage.setItem('fund_cart', JSON.stringify(c)),
      maxItemsLimit: () => parseInt(localStorage.getItem('maxItemsLimit') || '10'),
      saveMaxItemsLimit: (v) => localStorage.setItem('maxItemsLimit', v)
    };

    function initData() {
      if (STORAGE.users().length === 0) STORAGE.saveUsers([{ id: '1', firstName: 'Иван', lastName: 'Иванов', email: 'user@test.com', password: '123456', phone: '+79161234567', role: 'user', avatar: '' }, { id: 'adm', firstName: 'Админ', email: 'admin@fond.ru', password: 'admin123', role: 'admin', phone: '', avatar: '' }]);
      if (STORAGE.products().length === 0) STORAGE.saveProducts([{ id: 'p1', article: 'GR001', name: 'Гречка 1кг', category: 'Продукты', photos: [], quantity: 10, availableQuantity: 10, isPlaced: true }, { id: 'p2', article: 'RS002', name: 'Рис 1кг', category: 'Продукты', photos: [], quantity: 5, availableQuantity: 5, isPlaced: true }]);
      if (STORAGE.slots().length === 0) { let d = new Date(); d.setDate(d.getDate() + 1); STORAGE.saveSlots([{ id: 's1', datetime: d.toISOString().slice(0, 16), capacity: 5, used: 0 }]); }
      if (STORAGE.orders().length === 0) STORAGE.saveOrders([{ id: 'ORD-demo', userId: '1', items: [{ productId: 'p1', article: 'GR001', name: 'Гречка 1кг', status: 'pending' }], slotId: 's1', slotTime: new Date().toISOString(), address: 'Южное Бутово, Остафьевская ул, 44', status: 'pending', createdAt: new Date().toISOString(), recipient: { firstName: 'Иван', lastName: 'Иванов', phone: '+79161234567', email: 'user@test.com' }, comment: '' }]);
    }
    initData();

    let petitionSelectMode = false, selectedPetitionKeys = new Set(), currentCalendarDate = new Date(), leafletMap = null, selectedPhotoFilters = new Set();
    window.tempProductPhotos = [];

    window.showRegister = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; };
    window.showLogin = () => { document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; };
    window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    window.login = () => {
      const email = document.getElementById('loginEmail').value.trim(), pass = document.getElementById('loginPassword').value;
      const user = STORAGE.users().find(u => u.email === email && u.password === pass);
      if (!user) return alert('Неверные данные');
      STORAGE.setCurrentUser(user);
      if (user.role === 'admin') { showScreen('adminScreen'); renderAdmin(); }
      else { showScreen('mainScreen'); updateUIForUser(); initMap(); updateHeaderAvatar(); }
    };
    window.register = () => {
      const first = document.getElementById('regFirstName').value.trim(), last = document.getElementById('regLastName').value.trim(), email = document.getElementById('regEmail').value.trim(), pass = document.getElementById('regPassword').value, confirm = document.getElementById('regConfirm').value, phone = document.getElementById('regPhone').value.trim(), code = document.getElementById('countryCode').value;
      if (!first || !last || !email || !pass || !phone) return alert('Заполните все поля');
      if (pass !== confirm) return alert('Пароли не совпадают');
      if (STORAGE.users().some(u => u.email === email)) return alert('Email занят');
      const newUser = { id: Date.now() + '', firstName: first, lastName: last, email, password: pass, phone: code + phone, role: 'user', avatar: '' };
      STORAGE.saveUsers([...STORAGE.users(), newUser]); STORAGE.setCurrentUser(newUser);
      showScreen('mainScreen'); updateUIForUser(); initMap(); updateHeaderAvatar();
    };
    window.logout = () => { STORAGE.setCurrentUser(null); STORAGE.saveCart([]); showScreen('authScreen'); };
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => switchTab(el.dataset.tab)));
    window.switchTab = (tabId) => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navItem = document.querySelector(`.nav-item[data-tab="${tabId}"]`); if (navItem) navItem.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
      document.getElementById(tabId + 'Tab').style.display = 'block';
      if (tabId === 'home') { renderProducts(); populateCategoryFilter(); }
      if (tabId === 'cart') { renderCart(); initMap(); }
      if (tabId === 'profile') renderProfile();
      if (tabId === 'orders') { populateOrderSlotFilter(); renderUserOrders(); }
    };

    function updateHeaderAvatar() {
      const u = STORAGE.currentUser(); if (!u) return;
      const icon = document.getElementById('headerProfileIcon');
      if (u.avatar) icon.innerHTML = `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
      else icon.innerHTML = '<i class="fas fa-user-circle" style="font-size:28px;color:#007aff;"></i>';
    }

    // ========== ПОЛЬЗОВАТЕЛЬ ==========
    function getProductRequestCount(productId) {
      return STORAGE.orders().filter(o => o.status === 'pending' || o.status === 'partially_approved').flatMap(o => o.items).filter(i => i.productId === productId && i.status === 'pending').length;
    }
    function populateCategoryFilter() {
      const cats = [...new Set(STORAGE.products().map(p => p.category))];
      document.getElementById('categoryFilter').innerHTML = '<option value="">Все категории</option>' + cats.map(c => `<option>${c}</option>`).join('');
    }
    function renderProducts() {
      let prods = STORAGE.products().filter(p => p.isPlaced && p.availableQuantity > 0);
      const cat = document.getElementById('categoryFilter')?.value; if (cat) prods = prods.filter(p => p.category === cat);
      const sort = document.getElementById('sortFilter')?.value;
      if (sort === 'name_asc') prods.sort((a,b) => a.name.localeCompare(b.name));
      else if (sort === 'name_desc') prods.sort((a,b) => b.name.localeCompare(a.name));
      else if (sort === 'new') prods.sort((a,b) => b.id.localeCompare(a.id));
      else if (sort === 'old') prods.sort((a,b) => a.id.localeCompare(b.id));
      document.getElementById('productsContainer').innerHTML = prods.map(p => `<div class="product-card"><div class="product-photo" onclick="openFullscreenPhoto('${p.photos?.[0]||''}')">${p.photos?.length?`<img src="${p.photos[0]}">`:'<i class="fas fa-image"></i>'}</div><h4>${p.name}</h4><small>${p.article}</small><div class="product-stats">В наличии: ${p.availableQuantity}</div><div class="product-stats">👥 Запросов: ${getProductRequestCount(p.id)}</div><button class="btn primary small" onclick="addToCart('${p.id}')">В корзину</button></div>`).join('');
    }
    window.addToCart = (prodId) => {
      const limit = STORAGE.maxItemsLimit(), cart = STORAGE.cart();
      if (cart.length >= limit) return alert(`Лимит ${limit}`);
      const p = STORAGE.products().find(p => p.id === prodId);
      if (!p || p.availableQuantity < 1) return alert('Недоступен');
      if (cart.some(i => i.id === prodId)) return alert('Уже в корзине');
      cart.push({ ...p, quantity: 1 }); STORAGE.saveCart(cart); updateCartBadge();
    };
    function updateCartBadge() { document.getElementById('navCartBadge').textContent = STORAGE.cart().length; }
    function renderCart() {
      const cart = STORAGE.cart();
      document.getElementById('cartItems').innerHTML = cart.length ? cart.map((item,idx) => `<div class="cart-item"><img class="cart-item-photo" src="${item.photos?.[0]||''}"><div class="cart-item-info"><strong>${item.name}</strong></div><i class="fas fa-trash" onclick="removeFromCart(${idx})"></i></div>`).join('') : '<p>Корзина пуста</p>';
      const now = new Date(); const slots = STORAGE.slots().filter(s => new Date(s.datetime) > now && s.used < s.capacity);
      document.getElementById('timeSlotSelect').innerHTML = slots.map(s => `<option value="${s.id}">${new Date(s.datetime).toLocaleString()}</option>`).join('');
    }
    window.removeFromCart = (idx) => { let cart = STORAGE.cart(); cart.splice(idx,1); STORAGE.saveCart(cart); renderCart(); updateCartBadge(); };
    function initMap() {
      if (leafletMap) { leafletMap.remove(); leafletMap = null; }
      const mapEl = document.getElementById('cartMap'); if (!mapEl) return;
      leafletMap = L.map(mapEl).setView([55.531570, 37.498393], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
      L.marker([55.531570, 37.498393]).addTo(leafletMap).bindPopup('Южное Бутово, Остафьевская ул, 44').openPopup();
    }
    window.createOrder = () => {
      const user = STORAGE.currentUser(), cart = STORAGE.cart(); if (!cart.length) return alert('Корзина пуста');
      const slotId = document.getElementById('timeSlotSelect').value; if (!slotId) return alert('Выберите время');
      const slots = STORAGE.slots(); const slot = slots.find(s => s.id === slotId); if (slot.used >= slot.capacity) return alert('Слот заполнен');
      const items = cart.map(p => ({ productId: p.id, article: p.article, name: p.name, status: 'pending' }));
      const order = { id: 'ORD-' + Date.now(), userId: user.id, items, slotId: slot.id, slotTime: slot.datetime, address: 'Южное Бутово, Остафьевская ул, 44', status: 'pending', createdAt: new Date().toISOString(), recipient: { firstName: user.firstName, lastName: user.lastName, phone: user.phone, email: user.email }, comment: '' };
      STORAGE.saveOrders([...STORAGE.orders(), order]); slot.used++; STORAGE.saveSlots(slots); STORAGE.saveCart([]); updateCartBadge();
      alert('Заказ отправлен'); switchTab('orders');
    };
    function renderProfile() {
      const u = STORAGE.currentUser(); if (!u) return;
      document.getElementById('profileName').textContent = `${u.firstName} ${u.lastName||''}`;
      document.getElementById('profilePhone').textContent = u.phone;
      if (u.avatar) { document.getElementById('profileAvatar').src = u.avatar; document.getElementById('defaultAvatar').style.display='none'; }
      else { document.getElementById('profileAvatar').style.display='none'; document.getElementById('defaultAvatar').style.display='block'; }
    }
    window.saveAvatar = () => {
      const file = document.getElementById('avatarInput').files[0]; if (!file) return;
      const reader = new FileReader(); reader.onload = e => { const users = STORAGE.users(), cur = STORAGE.currentUser(); const idx = users.findIndex(u => u.id === cur.id); users[idx].avatar = e.target.result; STORAGE.saveUsers(users); STORAGE.setCurrentUser(users[idx]); renderProfile(); updateHeaderAvatar(); }; reader.readAsDataURL(file);
    };
    function populateOrderSlotFilter() {
      const slots = STORAGE.slots();
      document.getElementById('orderSlotFilter').innerHTML = '<option value="">Все даты</option>' + slots.map(s => `<option value="${s.datetime}">${new Date(s.datetime).toLocaleString()}</option>`).join('');
    }
    function renderUserOrders() {
      const user = STORAGE.currentUser(); let orders = STORAGE.orders().filter(o => o.userId === user.id);
      const status = document.getElementById('orderStatusFilter')?.value; if (status) orders = orders.filter(o => o.status === status);
      const slot = document.getElementById('orderSlotFilter')?.value; if (slot) orders = orders.filter(o => o.slotTime === slot);
      document.getElementById('ordersList').innerHTML = orders.map(o => `<div class="order-card"><b>${o.id}</b> ${new Date(o.createdAt).toLocaleDateString()}<br>Статус: ${o.status}<br>Слот: ${new Date(o.slotTime).toLocaleString()}<br>Товары: ${o.items.map(i => `<span style="display:inline-flex;align-items:center;gap:4px;">${STORAGE.products().find(p=>p.id===i.productId)?.photos?.[0] ? `<img src="${STORAGE.products().find(p=>p.id===i.productId).photos[0]}" style="width:20px;height:20px;border-radius:4px;" onclick="openFullscreenPhoto('${STORAGE.products().find(p=>p.id===i.productId).photos[0]}')">`:''}${i.name} (${i.status==='approved'?'✓':i.status==='rejected'?'✗':'⏳'})</span>`).join(', ')}</div>`).join('');
    }
    function updateUIForUser() { updateCartBadge(); renderProducts(); populateCategoryFilter(); switchTab('home'); updateHeaderAvatar(); }

    // ========== АДМИНКА ==========
    function renderAdmin() {
      renderAdminProducts(); renderAdminSlots(); renderAllOrders(); renderRecipientsTab(); renderPetitions(); renderCalendar();
      document.querySelectorAll('.admin-tabs .tab-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-tabs .tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        document.querySelectorAll('.admin-pane').forEach(p => p.classList.remove('active'));
        document.getElementById('admin' + btn.dataset.adminTab.charAt(0).toUpperCase() + btn.dataset.adminTab.slice(1)).classList.add('active');
        if (btn.dataset.adminTab === 'petitions') renderPetitions();
        if (btn.dataset.adminTab === 'calendar') renderCalendar();
      }));
      document.getElementById('categoryFilter').addEventListener('change', renderProducts);
      document.getElementById('sortFilter').addEventListener('change', renderProducts);
      document.getElementById('orderStatusFilter').addEventListener('change', renderUserOrders);
      document.getElementById('orderSlotFilter').addEventListener('change', renderUserOrders);
      document.getElementById('petitionSearch').addEventListener('input', renderPetitions);
      document.getElementById('adminOrderDateFilter').addEventListener('change', renderAllOrders);
    }
    function renderAdminProducts() {
      document.getElementById('adminProductsList').innerHTML = STORAGE.products().map(p => `<div class="admin-product-card"><div class="product-photo" onclick="openFullscreenPhoto('${p.photos?.[0]||''}')">${p.photos?.length?`<img src="${p.photos[0]}">`:'<i class="fas fa-image"></i>'}</div><h4>${p.name}</h4><small>${p.article}</small><div class="product-stats">В наличии: ${p.availableQuantity}/${p.quantity}</div><div>${p.isPlaced ? '✅ Размещён' : `⏳ Ожидает <button class="btn primary small" onclick="placeProduct('${p.id}')">Разместить</button>`}</div><i class="fas fa-trash text-danger" style="float:right;" onclick="deleteProduct('${p.id}')"></i></div>`).join('');
    }
    window.placeProduct = (id) => { const prods = STORAGE.products(); const p = prods.find(p => p.id === id); if (p) { p.isPlaced = true; STORAGE.saveProducts(prods); renderAdminProducts(); } };
    window.deleteProduct = (id) => { STORAGE.saveProducts(STORAGE.products().filter(p => p.id !== id)); renderAdminProducts(); };
    window.openAddProductModal = () => { document.getElementById('addProductModal').style.display = 'flex'; document.getElementById('prodName').value = ''; document.getElementById('prodArticle').value = ''; document.getElementById('prodQuantity').value = 1; document.getElementById('prodPlaceImmediately').checked = false; document.getElementById('photoPreviewContainer').innerHTML = ''; window.tempProductPhotos = []; };
    document.getElementById('productPhotosInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files).slice(0,3); const preview = document.getElementById('photoPreviewContainer'); preview.innerHTML = ''; window.tempProductPhotos = [];
      files.forEach(f => { const r = new FileReader(); r.onload = ev => { window.tempProductPhotos.push(ev.target.result); const img = document.createElement('img'); img.src = ev.target.result; preview.appendChild(img); }; r.readAsDataURL(f); });
    });
    window.addProduct = () => {
      const name = document.getElementById('prodName').value, article = document.getElementById('prodArticle').value, category = document.getElementById('prodCategory').value, quantity = parseInt(document.getElementById('prodQuantity').value)||1, isPlaced = document.getElementById('prodPlaceImmediately').checked;
      if (!name || !article) return alert('Заполните');
      STORAGE.saveProducts([...STORAGE.products(), { id: 'p_' + Date.now(), article, name, category, photos: window.tempProductPhotos || [], quantity, availableQuantity: quantity, isPlaced }]);
      closeModal('addProductModal'); renderAdminProducts();
    };
    function renderAdminSlots() { document.getElementById('slotsList').innerHTML = STORAGE.slots().map(s => `<div>${new Date(s.datetime).toLocaleString()} (${s.used}/${s.capacity}) <i class="fas fa-trash" onclick="deleteSlot('${s.id}')"></i></div>`).join(''); }
    window.deleteSlot = (id) => { STORAGE.saveSlots(STORAGE.slots().filter(s => s.id !== id)); renderAdminSlots(); renderCalendar(); };
    window.openAddSlotModal = () => { document.getElementById('addSlotModal').style.display = 'flex'; document.getElementById('slotDateTime').value = ''; document.getElementById('slotCapacity').value = 5; };
    window.addSlot = () => { const dt = document.getElementById('slotDateTime').value, cap = parseInt(document.getElementById('slotCapacity').value); if (!dt || !cap) return; STORAGE.saveSlots([...STORAGE.slots(), { id: 's_' + Date.now(), datetime: dt, capacity: cap, used: 0 }]); closeModal('addSlotModal'); renderAdminSlots(); renderCalendar(); };

    // Календарь
    function renderCalendar() {
      const year = currentCalendarDate.getFullYear(), month = currentCalendarDate.getMonth();
      document.getElementById('calendarMonthYear').textContent = new Date(year, month).toLocaleString('ru', { month: 'long', year: 'numeric' });
      const firstDay = new Date(year, month, 1).getDay() || 7, daysInMonth = new Date(year, month + 1, 0).getDate();
      const slots = STORAGE.slots(); const slotDates = slots.map(s => s.datetime.split('T')[0]);
      let html = ''; for (let i = 1; i < firstDay; i++) html += '<div></div>';
      for (let d = 1; d <= daysInMonth; d++) { const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; html += `<div class="calendar-day ${slotDates.includes(dateStr)?'has-slot':''}" onclick="showSlotsForDate('${dateStr}')">${d}</div>`; }
      document.getElementById('calendarGrid').innerHTML = html;
    }
    window.changeCalendarMonth = (d) => { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + d); renderCalendar(); };
    window.showSlotsForDate = (dateStr) => {
      const orders = STORAGE.orders().filter(o => o.slotTime?.startsWith(dateStr));
      const products = STORAGE.products();
      const details = orders.flatMap(o => o.items.map(i => ({ ...i, orderId: o.id, recipient: o.recipient })));
      const html = details.map(d => `<div style="display:flex;align-items:center;gap:12px;padding:8px;background:white;border-radius:12px;margin-bottom:8px;"><img src="${products.find(p=>p.id===d.productId)?.photos?.[0]||''}" style="width:40px;height:40px;border-radius:20px;" onclick="openFullscreenPhoto('${products.find(p=>p.id===d.productId)?.photos?.[0]}')"><div><b>${d.name}</b><br>${d.recipient?.firstName} ${d.recipient?.lastName}</div><span style="margin-left:auto;">${d.status==='approved'?'✅':d.status==='rejected'?'❌':'⏳'}</span></div>`).join('');
      document.getElementById('calendarDayDetails').innerHTML = html || '<p>Нет заказов на эту дату</p>';
    };

    // Прошения
    function getPetitionItems() {
      const orders = STORAGE.orders(), users = STORAGE.users(), products = STORAGE.products(), petitions = [];
      orders.forEach(o => { if (o.status !== 'pending' && o.status !== 'partially_approved') return; const user = users.find(u => u.id === o.userId) || {};
        o.items.forEach((item, idx) => { if (item.status !== 'pending') return; const prod = products.find(p => p.id === item.productId) || {};
          petitions.push({ key: `${o.id}|${idx}`, orderId: o.id, itemIndex: idx, productId: item.productId, productName: item.name, productPhoto: prod.photos?.[0] || '', userName: `${user.firstName||''} ${user.lastName||''}`, userAvatar: user.avatar || '', userPhone: user.phone || '' });
        });
      }); return petitions;
    }
    window.renderPetitions = () => {
      const search = document.getElementById('petitionSearch').value.toLowerCase();
      let petitions = getPetitionItems().filter(p => p.productName.toLowerCase().includes(search) || p.userName.toLowerCase().includes(search));
      if (selectedPhotoFilters.size > 0) petitions = petitions.filter(p => selectedPhotoFilters.has(p.productId));
      const productPhotos = [...new Set(petitions.map(p => p.productPhoto).filter(Boolean))];
      document.getElementById('photoFilterStrip').innerHTML = productPhotos.map(src => `<div class="photo-filter-item ${selectedPhotoFilters.has(petitions.find(p=>p.productPhoto===src)?.productId) ? 'active' : ''}" onclick="togglePhotoFilter('${petitions.find(p=>p.productPhoto===src)?.productId}')"><img src="${src}"></div>`).join('');
      document.getElementById('petitionsList').innerHTML = petitions.map(p => `<div class="petition-item">${petitionSelectMode ? `<div class="selection-circle ${selectedPetitionKeys.has(p.key)?'selected':''}" onclick="togglePetitionSelection('${p.key}')"></div>`:''}<img src="${p.productPhoto}" style="width:50px;height:50px;border-radius:25px;" onclick="openFullscreenPhoto('${p.productPhoto}')"><div><b>${p.productName}</b><br>${p.userName}<br>📞${p.userPhone}</div>${p.userAvatar?`<img src="${p.userAvatar}" style="width:40px;height:40px;border-radius:20px;" onclick="openFullscreenPhoto('${p.userAvatar}')">`:'<i class="fas fa-user-circle"></i>'}${!petitionSelectMode?`<div><button class="btn primary small" onclick="approvePetitionItem('${p.orderId}',${p.itemIndex})">✓</button><button class="btn danger small" onclick="rejectPetitionItem('${p.orderId}',${p.itemIndex})">✗</button></div>`:''}</div>`).join('') || '<p>Нет прошений</p>';
      document.getElementById('petitionBulkActions').style.display = petitionSelectMode ? 'block' : 'none';
      const totalQty = petitions.reduce((sum, p) => sum + 1, 0);
      const available = STORAGE.products().filter(p => petitions.some(pt => pt.productId === p.id)).reduce((sum, p) => sum + p.availableQuantity, 0);
      document.getElementById('petitionStats').innerHTML = `🔍 Найдено позиций: ${petitions.length} | Остаток выбранных товаров: ${available}`;
    };
    window.togglePhotoFilter = (productId) => { selectedPhotoFilters.has(productId) ? selectedPhotoFilters.delete(productId) : selectedPhotoFilters.add(productId); renderPetitions(); };
    window.togglePetitionSelectMode = () => { petitionSelectMode = !petitionSelectMode; selectedPetitionKeys.clear(); document.getElementById('toggleSelectModeBtn').textContent = petitionSelectMode ? 'Готово' : 'Изм'; renderPetitions(); };
    window.togglePetitionSelection = (key) => { selectedPetitionKeys.has(key) ? selectedPetitionKeys.delete(key) : selectedPetitionKeys.add(key); renderPetitions(); };
    window.selectAllPetitions = () => { getPetitionItems().filter(p => { const s = document.getElementById('petitionSearch').value.toLowerCase(); return p.productName.toLowerCase().includes(s) || p.userName.toLowerCase().includes(s); }).forEach(p => selectedPetitionKeys.add(p.key)); renderPetitions(); };
    function processPetitionItem(orderId, itemIndex, approve) {
      const orders = STORAGE.orders(); const order = orders.find(o => o.id === orderId); if (!order) return false;
      const item = order.items[itemIndex]; if (item.status !== 'pending') return false;
      if (approve) { const prod = STORAGE.products().find(p => p.id === item.productId); if (!prod || prod.availableQuantity < 1) { alert('Товар закончился'); return false; } prod.availableQuantity--; STORAGE.saveProducts(STORAGE.products()); item.status = 'approved'; }
      else item.status = 'rejected';
      const statuses = order.items.map(i => i.status); order.status = statuses.every(s => s === 'approved') ? 'approved' : statuses.every(s => s === 'rejected') ? 'rejected' : 'partially_approved';
      STORAGE.saveOrders(orders); return true;
    }
    window.approvePetitionItem = (oid, idx) => { if (processPetitionItem(oid, idx, true)) { selectedPetitionKeys.clear(); renderPetitions(); renderAdminProducts(); } };
    window.rejectPetitionItem = (oid, idx) => { if (processPetitionItem(oid, idx, false)) { selectedPetitionKeys.clear(); renderPetitions(); } };
    window.bulkApprovePetitions = () => { for (let key of selectedPetitionKeys) { const [oid, idx] = key.split('|'); processPetitionItem(oid, parseInt(idx), true); } selectedPetitionKeys.clear(); renderPetitions(); renderAdminProducts(); };
    window.bulkRejectPetitions = () => { for (let key of selectedPetitionKeys) { const [oid, idx] = key.split('|'); processPetitionItem(oid, parseInt(idx), false); } selectedPetitionKeys.clear(); renderPetitions(); };

    function renderAllOrders() {
      let orders = STORAGE.orders(); const filter = document.getElementById('adminOrderDateFilter')?.value; if (filter) orders = orders.filter(o => o.slotTime === filter);
      document.getElementById('allOrdersList').innerHTML = orders.map(o => `<div class="order-card"><b>${o.id}</b> ${new Date(o.slotTime).toLocaleString()}<br>${o.recipient?.lastName} ${o.recipient?.firstName}<br>${o.items.map(i => `<span>${STORAGE.products().find(p=>p.id===i.productId)?.photos?.[0]?`<img src="${STORAGE.products().find(p=>p.id===i.productId).photos[0]}" class="mini-photo" onclick="openFullscreenPhoto('${STORAGE.products().find(p=>p.id===i.productId).photos[0]}')">`:''}${i.name} (${i.status==='approved'?'✓':i.status==='rejected'?'✗':'⏳'})</span>`).join(', ')}</div>`).join('');
    }
    window.exportOrdersToExcel = () => { /* ... */ alert('Excel exported'); };
    window.printStickersWord = () => { /* ... */ alert('Stickers printed'); };
    function renderRecipientsTab() { document.getElementById('maxItemsLimit').value = STORAGE.maxItemsLimit(); document.getElementById('currentLimitDisplay').textContent = STORAGE.maxItemsLimit(); }
    window.saveMaxItemsLimit = () => { const v = parseInt(document.getElementById('maxItemsLimit').value); if (v > 0) { STORAGE.saveMaxItemsLimit(v); renderRecipientsTab(); } };
    window.openFullscreenPhoto = (src) => { if (!src) return; document.getElementById('fullscreenImage').src = src; document.getElementById('fullscreenPhotoModal').style.display = 'flex'; };

    // Запуск
    const cur = STORAGE.currentUser();
    if (cur) { if (cur.role === 'admin') { showScreen('adminScreen'); renderAdmin(); } else { showScreen('mainScreen'); updateUIForUser(); initMap(); } }
    else showScreen('authScreen');
    updateCartBadge();
  })();
</script>
</body>
</html>
